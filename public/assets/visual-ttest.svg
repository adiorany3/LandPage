<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" role="img" aria-labelledby="title desc">
  <title id="title">ttest</title>
  <desc id="desc">T-Test visualization with sample comparison.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="920" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F3F7FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FF375F"/>
      <stop offset="1" stop-color="#0071E3"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="136%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#102033" flood-opacity="0.13"/>
    </filter>
  </defs>
  <rect width="920" height="560" rx="42" fill="url(#bg)"/>
  <circle cx="774" cy="94" r="170" fill="#FF375F" opacity="0.14"/>
  <circle cx="134" cy="492" r="190" fill="#30D158" opacity="0.10"/>
  <g filter="url(#shadow)">
    <rect x="64" y="58" width="792" height="444" rx="36" fill="#fff" fill-opacity="0.82" stroke="#DFE6F1"/>
    <rect x="96" y="92" width="728" height="58" rx="24" fill="#F7F9FC" stroke="#E4EAF3"/>
    <circle cx="130" cy="121" r="8" fill="#FF5F57"/><circle cx="156" cy="121" r="8" fill="#FFBD2E"/><circle cx="182" cy="121" r="8" fill="#28C840"/>
    <text x="218" y="130" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="900" fill="#1D1D1F">ttest</text>
    
    <rect x="96" y="184" width="728" height="244" rx="30" fill="#F8FAFD" stroke="#E4EAF3"/>
    <text x="130" y="236" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="900" fill="#1D1D1F">T-Test comparison</text>
    <line x1="152" y1="366" x2="760" y2="366" stroke="#CAD4E2" stroke-width="4"/>
    <rect x="206" y="286" width="112" height="80" rx="22" fill="#0071E3"/>
    <rect x="426" y="246" width="112" height="120" rx="22" fill="#FF375F"/>
    <line x1="262" y1="260" x2="262" y2="394" stroke="#1D1D1F" stroke-width="6" stroke-linecap="round" opacity="0.28"/>
    <line x1="482" y1="218" x2="482" y2="394" stroke="#1D1D1F" stroke-width="6" stroke-linecap="round" opacity="0.28"/>
    <path d="M318 278 C360 226, 402 226, 426 258" fill="none" stroke="#30D158" stroke-width="10" stroke-linecap="round"/>
    <text x="624" y="300" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="46" font-weight="900" fill="#1D1D1F">p &lt; .05</text>
    <text x="152" y="424" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="800" fill="#6E6E73">Effect size • Confidence interval • Human-readable interpretation</text>

  </g>
